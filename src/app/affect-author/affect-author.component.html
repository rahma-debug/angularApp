<div fxLayout="column" fxLayoutAlign="center center" >
 <mat-form-field appearance="fill">
  <mat-label>Select an author</mat-label>
  <mat-select [(value)]="selected">
    <mat-option *ngFor="let author of authors" [value]="author.name">{{
      author.name
    }}</mat-option>
  </mat-select>
</mat-form-field>
<button mat-raised-button color="primary" (click)="affectAuthor(this.selected)">
  submit
</button>
</div>
